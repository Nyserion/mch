<!doctype html>

  <style>

,"reference":"辛亥革命是资产阶级领导的以反对封建君主专制制度，建立资产阶级共和国为目的的革命，是一次比较完全意义上的资产阶级民主革命。 第一，推翻了清王朝的统治，沉重打击了中外反动势力，使中国反动统治者在政治上乱了阵脚。 第二，结束了中国延续两千多年封建社会的君主专制制度，建立了中国历史上第一个资产阶级共和政府，使民主共和的观念开始深入人心。 第三，推动了中国人民的思想解放，是中国人民为救亡图存，振兴中华而奋起革命的一个里程碑。激发了人民的爱国热情和民族觉醒，打开了禁锢思想进步的闸门。 第四，推动了中国的社会变革，促使中国的社会经济、思想习惯和社会风俗等方面发生了新的积极变化。 最后，辛亥革命不仅在一定程度上打击了帝国主义的侵略势力，而且推动了亚洲各民族解放运动的高潮。","explanation":"本题属于主观题，作答时应围绕参考答案中的核心要点展开：辛亥革命是资产阶级领导的以反对封建君主专制制度，建立资产阶级共和国为目的的革命，是一次比较完全意义上的资产阶级民主革命。 第一，推翻了清王朝的统治，沉重打击了中外反动势力，使中国反动统治者在政治上乱了阵脚。 第二，结束了中国延续两千多年封建社会的君主专制制度，建立了中国历史上第一个资产阶级共和政府，使民主共和的观念开始..."},{"id":"q0122","chapter":"第四章 中国共产党的成立和中国革命的新局面","section":"一、单选题","type":"single","number":1,"prompt":"中国早期信仰马克思主义的人物中，属于原同盟会会员、辛亥革命活动家的是（ ）。","answer":"A","options":[{"label":"A","text":"董必武"},{"label":"B","text":"杨匏安"},{"label":"C","text":"毛泽东"},{"label":"D","text":"李公朴"}],"reference":"","explanation":"本题考查“中国早期信仰马克思主义的人物中，属于原同盟会会员、辛亥革命活动家的是。”。正确答案是 A，对应“A. 董必武”。该选项正好回答题干中的关键限定；其余选项与题干所问的时间、人物、事件、性质或结论不一致。"},{"id":"q0123","chapter":"第四章 中国共产党的成立和中国革命的新局面","section":"一、单选题","type":"single","number":2,"prompt":"中共一大讨论党的实际工作计划时，决定首先（ ）。","answer":"C","options":[{"label":"A","text":"武装革命"},{"label":"B","text":"制定党的纲领"},{"label":"C","text":"集中精力组织工人"},{"label":"D","text":"宣传马克思主义"}],"reference":"","explanation":"本题考查“中共一大讨论党的实际工作计划时，决定首先。”。正确答案是 C，对应“C. 集中精力组织工人”。该选项正好回答题干中的关键限定；其余选项与题干所问的时间、人物、事件、性质或结论不一致。"},{"id":"q0124","chapter":"第四章 中国共产党的成立和中国革命的新局面","section":"一、单选题","type":"single","number":3,"prompt":"1923年2月7日，（ ）罢工遭到反动军阀血腥镇压，造成二七惨案。","answer":"C","options":[{"label":"A","text":"京张铁路"},{"label":"B","text":"京广铁路"},{"label":"C","text":"京汉铁路"},{"label":"D","text":"京包铁路"}],"reference":"","explanation":"本题考查“1923年2月7日，罢工遭到反动军阀血腥镇压，造成二七惨案。”。正确答案是 C，对应“C. 京汉铁路”。该选项正好回答题干中的关键限定；其余选项与题干所问的时间、人物、事件、性质或结论不一致。"},{"id":"q0125","chapter":"第四章 中国共产党的成立和中国革命的新局面","section":"一、单选题","type":"single","number":4,"prompt":"为造就革命武装的骨干力量，在共产党人建议下，国民党一大决定创办一所陆军军官学校（ ）。","answer":"B","options":[{"label":"A","text":"京师大学堂"},{"label":"B","te       box.className = 'feedback ' + (kind || '');
      const answer = q.type === 'essay' ? (q.reference || '无') : q.answer;
      box.innerHTML = text + '<div class="answer"><b>答案：</b>' + escapeHtml(answer) + '</div><div class="explain"><b>解析：</b>' + escapeHtml(q.explanation || '无') + '</div>';
      box.hidden = false;
    }
    function markChoice(q) {
      document.querySelectorAll('.option').forEach(el => {
        const label = el.dataset.label;
        el.classList.toggle('correct', q.answer.includes(label));
        el.classList.toggle('wrong', el.classList.contains('selected') && !q.answer.includes(label));
      });
    }
    function submitCurrent() {
      const q = currentList[currentIndex];
      if (!q) return;
      const st = itemState(q.id);
      let ok = false;
      if (q.type === 'single' || q.type === 'multiple' || q.type === 'judge') {
        ok = selectedLabels() === String(q.answer).split('').sort().join('');
        markChoice(q);
        setFeedback(ok ? 'good' : 'bad', ok ? '回答正确' : '回答错误', q);
      } else if (q.type === 'blank') {
        const value = document.getElementById('blankInput').value;
        ok = normalizeAnswer(value) === normalizeAnswer(q.answer);
        setFeedback(ok ? 'good' : 'bad', ok ? '回答正确' : '可再记一遍', q);
      } else {
        ok = true;
        setFeedback('', '参考答案', q);
      }
      st.done = true;
      st.right = ok;
      st.wrong = !ok && q.type !== 'essay';
      saveState();
    }
    function revealCurrent() {
      const q = currentList[currentIndex];
      if (!q) return;
      if (q.type === 'single' || q.type === 'multiple' || q.type === 'judge') markChoice(q);
      itemState(q.id).done = true;
      setFeedback('', '已显示答案', q);
      saveState();
    }
    function toggleStar() {
      const q = currentList[currentIndex];
      if (!q) return;
      const st = itemState(q.id);
      st.star = !st.star;
      saveState();
      renderQuestion();
    }
    function renderQuestion() {
      const card = document.getElementById('card');
      const q = currentList[currentIndex];
      document.getElementById('positionPill').textContent = '第 ' + (currentList.length ? currentIndex + 1 : 0) + ' / ' + currentList.length + ' 题';
      document.getElementById('typePill').textContent = filters.type === 'all' ? '全部题型' : typeNames[filters.type];
      if (!q) {
        card.innerHTML = '<div class="empty">当前筛选下没有题目</div>';
        renderNav();
        return;
      }
      const st = itemState(q.id);
      let body = '';
      if (q.type === 'single' || q.type === 'multiple' || q.type === 'judge') {
        body = '<div class="options">' + q.options.map(o => '<div class="option" data-label="' + o.label + '" role="button" tabindex="0"><span class="badge">' + o.label + '</span><span>' + escapeHtml(o.text) + '</span></div>').join('') + '</div>';
      } else if (q.type === 'blank') {
        body = '<input class="blank-input" id="blankInput" placeholder="输入答案后提交">';
      } else {
        body = '<textarea class="essay-text" placeholder="可在这里默写要点"></textarea>';
      }
      card.innerHTML = `
        <div class="question-head">
          <div>
            <div class="meta">${escapeHtml(q.chapter)} · ${escapeHtml(q.section)} · 第 ${q.number} 题</div>
            <div class="prompt">${escapeHtml(q.prompt)}</div>
          </div>
          <button class="icon ${st.star ? 'active' : ''}" id="starBtn" title="收藏">${st.star ? '★' : '☆'}</button>
        </div>
        ${body}
        <div class="actions">
          <div class="left">
            <button class="primary" id="submitBtn">${q.type === 'essay' ? '看参考' : '提交'}</button>
            <button id="revealBtn">显示答案/解析</button>
          </div>
          <div class="right"><button id="markWrongBtn">标为错题</button></div>
        </div>
        <div id="feedback" class="feedback" hidden></div>
      `;
      document.getElementById('starBtn').addEventListener('click', toggleStar);
      document.getElementById('submitBtn').addEventListener('click', submitCurrent);
      document.getElementById('revealBtn').addEventListener('click', revealCurrent);
      document.getElementById('markWrongBtn').addEventListener('click', () => {
        const s = itemState(q.id);
        s.done = true; s.wrong = true; s.right = false; saveState();
      });
      document.querySelectorAll('.option').forEach(el => {
        el.addEventListener('click', () => {
          if (q.type === 'single' || q.type === 'judge') document.querySelectorAll('.option').forEach(x => x.classList.remove('selected'));
          el.classList.toggle('selected');
        });
        el.addEventListener('keydown', ev => {
          if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); el.click(); }
        });
      });
      renderNav();
    }
    function renderNav() {
      const nav = document.getElementById('questionList');
      nav.innerHTML = currentList.map((q, i) => {
        const st = itemState(q.id);
        const cls = ['qnav'];
        if (i === currentIndex) cls.push('current');
        if (st.done) cls.push('done');
        if (st.wrong) cls.push('wronged');
        return '<button class="' + cls.join(' ') + '" data-i="' + i + '">' + (i + 1) + '</button>';
      }).join('');
      nav.querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => {
        currentIndex = Number(btn.dataset.i);
        renderQuestion();
      }));
    }
    function updateStats() {
      let done = 0, right = 0, wrong = 0;
      for (const q of items) {
        const st = itemState(q.id);
        if (st.done) done++;
        if (st.right) right++;
        if (st.wrong) wrong++;
      }
      document.getElementById('totalCount').textContent = items.length;
      document.getElementById('doneCount').textContent = done;
      document.getElementById('rightCount').textContent = right;
      document.getElementById('wrongCount').textContent = wrong;
    }
    function applyFilters() {
      currentList = filteredItems();
      currentIndex = Math.min(currentIndex, Math.max(currentList.length - 1, 0));
      renderQuestion();
      updateStats();
    }
    function initControls() {
      document.getElementById('sourceName').textContent = DATA.source;
      const chapterSelect = document.getElementById('chapterSelect');
      chapterSelect.innerHTML = '<option value="all">全部章节</option>' + chapters().map(ch => '<option value="' + escapeHtml(ch) + '">' + escapeHtml(ch) + '</option>').join('');
      chapterSelect.addEventListener('change', () => { filters.chapter = chapterSelect.value; currentIndex = 0; applyFilters(); });
      const typeButtons = document.getElementById('typeButtons');
      typeButtons.innerHTML = '<button data-type="all" class="active">全部</button>' + Object.entries(typeNames).map(([key, name]) => '<button data-type="' + key + '">' + name + '</button>').join('');
      typeButtons.querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => {
        typeButtons.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); filters.type = btn.dataset.type; currentIndex = 0; applyFilters();
      }));
      document.getElementById('modeButtons').querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => {
        document.getElementById('modeButtons').querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); filters.mode = btn.dataset.mode; currentIndex = 0; applyFilters();
      }));
      document.getElementById('searchInput').addEventListener('input', ev => { filters.search = ev.target.value; currentIndex = 0; applyFilters(); });
      document.getElementById('prevBtn').addEventListener('click', () => { if (!currentList.length) return; currentIndex = (currentIndex - 1 + currentList.length) % currentList.length; renderQuestion(); });
      document.getElementById('nextBtn').addEventListener('click', () => { if (!currentList.length) return; currentIndex = (currentIndex + 1) % currentList.length; renderQuestion(); });
      document.getElementById('shuffleBtn').addEventListener('click', () => { if (!currentList.length) return; currentIndex = Math.floor(Math.random() * currentList.length); renderQuestion(); });
      document.getElementById('resetBtn').addEventListener('click', () => {
        if (confirm('清空本页保存的刷题进度？')) {
          localStorage.removeItem(stateKey);
          for (const key of Object.keys(state)) delete state[key];
          applyFilters();
        }
      });
    }
    initControls();
    applyFilters();
  </script>
</body>
</html>
