<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>中国近现代史纲要刷题</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #667085;
      --line: #d8dee7;
      --accent: #1d6f8f;
      --accent-weak: #dff3f6;
      --good: #137a43;
      --bad: #b42318;
      --warn: #b54708;
      --shadow: 0 8px 24px rgba(15, 23, 42, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      line-height: 1.6;
    }
    button, input, select, textarea { font: inherit; }
    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 7px;
      min-height: 38px;
      padding: 7px 12px;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    button.ghost { background: transparent; }
    button.active {
      background: var(--accent-weak);
      border-color: var(--accent);
      color: #0f5268;
      font-weight: 700;
    }
    button.icon {
      width: 38px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
    }
    aside {
      background: #101820;
      color: #f8fafc;
      padding: 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }
    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
      letter-spacing: 0;
    }
    .source {
      color: #b9c3d1;
      font-size: 13px;
      margin: 4px 0 0;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 14px 0;
    }
    .stat {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 7px;
      padding: 8px 10px;
    }
    .stat b {
      display: block;
      font-size: 20px;
      line-height: 1.2;
    }
    .stat span {
      color: #b9c3d1;
      font-size: 12px;
    }
    .filter-group { margin: 14px 0; }
    .filter-group label {
      display: block;
      color: #cbd5e1;
      font-size: 13px;
      margin-bottom: 6px;
    }
    .filter-group select,
    .filter-group input {
      width: 100%;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.09);
      color: #fff;
      border-radius: 7px;
      min-height: 40px;
      padding: 7px 10px;
      outline: none;
    }
    .filter-group option { color: #111827; }
    .type-buttons, .mode-buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    .type-buttons button, .mode-buttons button {
      color: #fff;
      border-color: rgba(255,255,255,.18);
      background: rgba(255,255,255,.08);
    }
    .type-buttons button.active, .mode-buttons button.active {
      background: #e6f6f8;
      color: #0f5268;
    }
    main {
      padding: 22px;
      min-width: 0;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .topbar .left, .topbar .right {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 30px;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 999px;
      padding: 3px 10px;
      color: var(--muted);
      font-size: 13px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 22px;
    }
    .question-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 14px;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .prompt {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.55;
      margin: 8px 0 18px;
      word-break: break-word;
    }
    .options {
      display: grid;
      gap: 10px;
      margin: 0 0 16px;
    }
    .option {
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      background: #fff;
    }
    .option:hover { border-color: var(--accent); }
    .option.selected {
      border-color: var(--accent);
      background: #f0fbfc;
    }
    .option.correct {
      border-color: #56b781;
      background: #eefbf3;
    }
    .option.wrong {
      border-color: #f3a39d;
      background: #fff1f0;
    }
    .badge {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid currentColor;
      border-radius: 50%;
      font-weight: 700;
    }
    .blank-input, .essay-text {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
      outline: none;
    }
    .blank-input:focus, .essay-text:focus { border-color: var(--accent); }
    .essay-text { min-height: 120px; resize: vertical; }
    .actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    .actions .left, .actions .right {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .feedback {
      margin-top: 16px;
      border-radius: 8px;
      border: 1px solid var(--line);
      padding: 12px 14px;
      background: #f8fafc;
    }
    .feedback.good { border-color: #89d5a8; color: var(--good); background: #effbf4; }
    .feedback.bad { border-color: #f0a6a0; color: var(--bad); background: #fff3f2; }
    .answer {
      margin-top: 10px;
      color: var(--ink);
      white-space: pre-wrap;
    }
    .question-list {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(42px, 1fr));
      gap: 8px;
    }
    .qnav {
      min-width: 42px;
      height: 38px;
      padding: 0;
      border-radius: 7px;
      font-size: 13px;
    }
    .qnav.current { border-color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent); }
    .qnav.done { background: #eefbf3; border-color: #8bd4aa; }
    .qnav.wronged { background: #fff1f0; border-color: #f3a39d; }
    .empty {
      color: var(--muted);
      text-align: center;
      padding: 44px 16px;
    }
    .mobile-toggle { display: none; }
    @media (max-width: 860px) {
      .app { grid-template-columns: 1fr; }
      aside {
        position: static;
        height: auto;
      }
      main { padding: 14px; }
      .topbar { align-items: stretch; flex-direction: column; }
      .prompt { font-size: 18px; }
    }
  </style>
</head>

    </main>

{"id":"q0123","chapter":"第三章 辛亥革命与君主专制制度的终结","section":"五、论述题","type":"essay","number":1,"prompt":"简述辛亥革命的历史意义？","answer":"","options":[],"reference":"辛亥革命是资产阶级领导的以反对封建君主专制制度，建立资产阶级共 和国为目的的革命，是一次比较完全意义上的资产阶级民主革命。在近代历史上， 辛亥革命是中国人民为救亡图存，振兴中华而奋起革命的一个里程碑。他使中国 发生了历史性的巨变，具有伟大的历史意义—— 第一，辛亥革命推翻了清王朝的统治，沉重打击了中外反动势力，使中国反 动统治者在政治上乱了阵脚。 第二，辛亥革命结束了中国延续两千多年封建社会的君主专制制度，建立了 中国历史上第一个资产阶级共和政府，使民主共和的观念开始深入人心。 第三，辛亥革命推动了中国人民的思想解放。激发了人民的爱国热情和民族 觉醒，打开了禁锢思想进步的闸门。 第四，辛亥革命推动了中国的社会变革，促使中国的社会经济、思想习惯和 社会风俗等方面发生了新的积极变化。 最后，辛亥革命不仅在一定程度上打击了帝国主义的侵略势力，而且推动了 亚洲各民族解放运动的高潮。"},{"id":"q0124","chapter":"第四章 中国共产党的成立和中国革命的新局面","section":"一、单选题","type":"single","number":1,"prompt":"“十月革命一声炮响，给中国带来了马克思列宁主义”。五四运动以后，马克 思列宁主义在中国得到了广泛传播。在中国最早讴歌十月革命，比较系统地介绍 马克思主义的是（ ）。","answer":"B","options":[{"label":"A","text":"陈独秀"},{"label":"B","text":"李大钊"},{"label":"C","text":"毛泽东"},{"label":"D","text":"瞿秋白"}],"reference":""},{"id":"q0125","chapter":"第四章 中国共产党的成立和中国革命的新局面","section":"一、单选题","type":"single","number":2,"prompt":"中国早期信仰马克思主义的人物中，属于原同盟会会员、辛亥革命活动家的是（ ）。","answer":"A","options":[{"label":"A","text":"董必武"},{"label":"B","text":"杨匏安"},{"label":"C","text":"毛泽东"},{"label":"D","text":"李公朴"}],"reference":""},{"id":"q0126","chapter":"第四章 中国共产党的成立和中国革命的新局面","section":"一、单选题","type":"single","number":3,"prompt":"中共一大讨论党的实际工作计划时，决定首先（ ）。","answer":"C","options":[{"label":"A","text":"武装革命"},{"label":"B","text":"制定党的纲领"},{"label":"C","text":"集中精力组织工人"},{"label":"D","text":"宣传马克思主义"}],"reference":""},{"id":"q0127","chapter":"第四章 中国共产党的成立和中国革命的新局面","section":"一、单选题","type":"single","number":4,"prompt":"1923 年 2 月 7 日，（ ）罢工遭到反动军阀血腥镇压，造成二七惨案。","answer":"C","options":[{"label":"A","text":"京张铁路"},{"label":"B","text":"京广铁路"},{"label":"C","text":"京汉铁路"},{"label":"D","text":"京包铁路"}],"reference":""},{"id":"q0128","chapter":"第四章 中国共产党的成立和中国革命的新局面","section":"一、单选题","type":"single","number":5,"prompt":"为造就革命武装的骨干力量，在共产党人建议下，国民党一大决定创办一所陆 军军官学校（ ）。","answer":"B","options":[{"label":"A","text":"京师大学堂"},{"label":"B","text":"黄埔军校"},{"label":         if (filters.mode === 'unseen' && st.done) return false;
        if (needle) {
          const hay = [q.prompt, q.answer, q.reference, ...(q.options || []).map(o => o.text)].join(' ').toLowerCase();
          if (!hay.includes(needle)) return false;
        }
        return true;
      });
    }
    function setFeedback(kind, html) {
      const box = document.getElementById('feedback');
      if (!box) return;
      box.className = 'feedback ' + (kind || '');
      box.innerHTML = html;
      box.hidden = false;
    }
    function markChoice(q) {
      document.querySelectorAll('.option').forEach(el => {
        const label = el.dataset.label;
        el.classList.toggle('correct', q.answer.includes(label));
        el.classList.toggle('wrong', el.classList.contains('selected') && !q.answer.includes(label));
      });
    }
    function submitCurrent() {
      const q = currentList[currentIndex];
      if (!q) return;
      const st = itemState(q.id);
      let ok = false;
      if (q.type === 'single' || q.type === 'multiple') {
        const picked = selectedLetters();
        ok = picked === q.answer.split('').sort().join('');
        markChoice(q);
        setFeedback(ok ? 'good' : 'bad', (ok ? '回答正确' : '回答错误') + '<div class="answer">正确答案：' + q.answer + '</div>');
      } else if (q.type === 'blank') {
        const value = document.getElementById('blankInput').value;
        ok = normalizeAnswer(value) === normalizeAnswer(q.answer);
        setFeedback(ok ? 'good' : 'bad', (ok ? '回答正确' : '可再记一遍') + '<div class="answer">参考答案：' + escapeHtml(q.answer) + '</div>');
      } else {
        ok = true;
        setFeedback('', '<b>参考答案</b><div class="answer">' + escapeHtml(q.reference || q.answer || '无') + '</div>');
      }
      st.done = true;
      st.right = ok;
      st.wrong = !ok && q.type !== 'essay';
      saveState();
    }
    function revealCurrent() {
      const q = currentList[currentIndex];
      if (!q) return;
      if (q.type === 'single' || q.type === 'multiple') markChoice(q);
      const answer = q.type === 'essay' ? (q.reference || '无') : q.answer;
      setFeedback('', '<b>答案</b><div class="answer">' + escapeHtml(answer) + '</div>');
      const st = itemState(q.id);
      st.done = true;
      saveState();
    }
    function toggleStar() {
      const q = currentList[currentIndex];
      if (!q) return;
      const st = itemState(q.id);
      st.star = !st.star;
      saveState();
      renderQuestion();
    }
    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
    }
    function renderQuestion() {
      const card = document.getElementById('card');
      const q = currentList[currentIndex];
      document.getElementById('positionPill').textContent = '第 ' + (currentList.length ? currentIndex + 1 : 0) + ' / ' + currentList.length + ' 题';
      document.getElementById('typePill').textContent = filters.type === 'all' ? '全部题型' : typeNames[filters.type];
      if (!q) {
        card.innerHTML = '<div class="empty">当前筛选下没有题目</div>';
        renderNav();
        return;
      }
      const st = itemState(q.id);
      let body = '';
      if (q.type === 'single' || q.type === 'multiple') {
        body = '<div class="options">' + q.options.map(o => '<div class="option" data-label="' + o.label + '" role="button" tabindex="0"><span class="badge">' + o.label + '</span><span>' + escapeHtml(o.text) + '</span></div>').join('') + '</div>';
      } else if (q.type === 'blank') {
        body = '<input class="blank-input" id="blankInput" placeholder="输入答案后提交">';
      } else {
        body = '<textarea class="essay-text" placeholder="可在这里默写要点"></textarea>';
      }
      card.innerHTML = `
        <div class="question-head">
          <div>
            <div class="meta">${escapeHtml(q.chapter)} · ${escapeHtml(q.section)} · 第 ${q.number} 题</div>
            <div class="prompt">${escapeHtml(q.prompt)}</div>
          </div>
          <button class="icon ${st.star ? 'active' : ''}" id="starBtn" title="收藏">${st.star ? '★' : '☆'}</button>
        </div>
        ${body}
        <div class="actions">
          <div class="left">
            <button class="primary" id="submitBtn">${q.type === 'essay' ? '看参考' : '提交'}</button>
            <button id="revealBtn">显示答案</button>
          </div>
          <div class="right">
            <button id="markWrongBtn">标为错题</button>
          </div>
        </div>
        <div id="feedback" class="feedback" hidden></div>
      `;
      document.getElementById('starBtn').addEventListener('click', toggleStar);
      document.getElementById('submitBtn').addEventListener('click', submitCurrent);
      document.getElementById('revealBtn').addEventListener('click', revealCurrent);
      document.getElementById('markWrongBtn').addEventListener('click', () => {
        const s = itemState(q.id);
        s.done = true;
        s.wrong = true;
        s.right = false;
        saveState();
      });
      document.querySelectorAll('.option').forEach(el => {
        el.addEventListener('click', () => {
          if (q.type === 'single') document.querySelectorAll('.option').forEach(x => x.classList.remove('selected'));
          el.classList.toggle('selected');
        });
        el.addEventListener('keydown', ev => {
          if (ev.key === 'Enter' || ev.key === ' ') {
            ev.preventDefault();
            el.click();
          }
        });
      });
      renderNav();
    }
    function renderNav() {
      const nav = document.getElementById('questionList');
      nav.innerHTML = currentList.map((q, i) => {
        const st = itemState(q.id);
        const cls = ['qnav'];
        if (i === currentIndex) cls.push('current');
        if (st.done) cls.push('done');
        if (st.wrong) cls.push('wronged');
        return '<button class="' + cls.join(' ') + '" data-i="' + i + '">' + (i + 1) + '</button>';
      }).join('');
      nav.querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => {
        currentIndex = Number(btn.dataset.i);
        renderQuestion();
      }));
    }
    function updateStats() {
      let done = 0, right = 0, wrong = 0;
      for (const q of items) {
        const st = itemState(q.id);
        if (st.done) done++;
        if (st.right) right++;
        if (st.wrong) wrong++;
      }
      document.getElementById('totalCount').textContent = items.length;
      document.getElementById('doneCount').textContent = done;
      document.getElementById('rightCount').textContent = right;
      document.getElementById('wrongCount').textContent = wrong;
    }
    function applyFilters() {
      currentList = filteredItems();
      currentIndex = Math.min(currentIndex, Math.max(currentList.length - 1, 0));
      renderQuestion();
      updateStats();
    }
    function initControls() {
      document.getElementById('sourceName').textContent = DATA.source;
      const chapterSelect = document.getElementById('chapterSelect');
      chapterSelect.innerHTML = '<option value="all">全部章节</option>' + chapters().map(ch => '<option value="' + escapeHtml(ch) + '">' + escapeHtml(ch) + '</option>').join('');
      chapterSelect.addEventListener('change', () => { filters.chapter = chapterSelect.value; currentIndex = 0; applyFilters(); });
      const typeButtons = document.getElementById('typeButtons');
      typeButtons.innerHTML = '<button data-type="all" class="active">全部</button>' + Object.entries(typeNames).map(([key, name]) => '<button data-type="' + key + '">' + name + '</button>').join('');
      typeButtons.querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => {
        typeButtons.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filters.type = btn.dataset.type;
        currentIndex = 0;
        applyFilters();
      }));
      document.getElementById('modeButtons').querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => {
        document.getElementById('modeButtons').querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filters.mode = btn.dataset.mode;
        currentIndex = 0;
        applyFilters();
      }));
      document.getElementById('searchInput').addEventListener('input', ev => {
        filters.search = ev.target.value;
        currentIndex = 0;
        applyFilters();
      });
      document.getElementById('prevBtn').addEventListener('click', () => {
        if (!currentList.length) return;
        currentIndex = (currentIndex - 1 + currentList.length) % currentList.length;
        renderQuestion();
      });
      document.getElementById('nextBtn').addEventListener('click', () => {
        if (!currentList.length) return;
        currentIndex = (currentIndex + 1) % currentList.length;
        renderQuestion();
      });
      document.getElementById('shuffleBtn').addEventListener('click', () => {
        if (!currentList.length) return;
        currentIndex = Math.floor(Math.random() * currentList.length);
        renderQuestion();
      });
      document.getElementById('resetBtn').addEventListener('click', () => {
        if (confirm('清空本页保存的刷题进度？')) {
          localStorage.removeItem(stateKey);
          for (const key of Object.keys(state)) delete state[key];
          applyFilters();
        }
      });
    }
    initControls();
    applyFilters();
  </script>
</body>
</html>
